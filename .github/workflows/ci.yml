name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

      # Report bundle size on PRs
      - name: Measure bundle size
        if: github.event_name == 'pull_request'
        id: size
        run: |
          SIZE=$(du -sb dist/ | cut -f1)
          SIZE_KB=$(echo "scale=1; $SIZE / 1024" | bc)
          JS_SIZE=$(find dist/ -name '*.js' ! -name '*.map' -exec cat {} + | wc -c)
          JS_SIZE_KB=$(echo "scale=1; $JS_SIZE / 1024" | bc)
          echo "total=${SIZE_KB}KB" >> "$GITHUB_OUTPUT"
          echo "js=${JS_SIZE_KB}KB" >> "$GITHUB_OUTPUT"

      - name: Comment bundle size
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const body = `📦 **Bundle size:** ${{ steps.size.outputs.total }} total, ${{ steps.size.outputs.js }} JS`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.startsWith('📦 **Bundle size:**'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - run: npm test

      # Verify Storybook builds successfully
      - run: npm run build-storybook
