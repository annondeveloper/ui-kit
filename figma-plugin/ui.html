<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; }
    body {
      font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;
      padding: 16px;
      color: var(--figma-color-text, #333);
      background: var(--figma-color-bg, #fff);
    }
    h2 { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
    p { font-size: 12px; color: var(--figma-color-text-secondary, #666); margin-bottom: 16px; }
    label { display: block; font-size: 11px; font-weight: 500; margin-bottom: 4px; }
    textarea {
      width: 100%;
      min-height: 160px;
      padding: 8px;
      border: 1px solid var(--figma-color-border, #ddd);
      border-radius: 6px;
      font-family: 'SF Mono', SFMono-Regular, Menlo, monospace;
      font-size: 11px;
      resize: vertical;
    }
    textarea:focus { outline: 2px solid var(--figma-color-bg-brand, #0d99ff); outline-offset: -1px; }
    .actions { display: flex; gap: 8px; margin-top: 12px; justify-content: flex-end; }
    button {
      padding: 6px 16px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
    }
    .btn-primary { background: var(--figma-color-bg-brand, #0d99ff); color: #fff; }
    .btn-primary:hover { opacity: 0.9; }
    .btn-secondary { background: var(--figma-color-bg-secondary, #f0f0f0); color: var(--figma-color-text, #333); }
  </style>
</head>
<body>
  <h2>Aurora UI Kit — Import Tokens</h2>
  <p>
    Paste the Figma Variables JSON exported by <code>ui-kit figma-export</code>.
    This will create a Variable Collection with all theme tokens.
  </p>

  <label for="tokens">Token JSON</label>
  <textarea id="tokens" placeholder='{"version":"1.0","collections":[...]}'></textarea>

  <div class="actions">
    <button class="btn-secondary" id="cancel">Cancel</button>
    <button class="btn-primary" id="import">Import Variables</button>
  </div>

  <script>
    document.getElementById('import').addEventListener('click', () => {
      const tokens = document.getElementById('tokens').value.trim()
      if (!tokens) return
      parent.postMessage({ pluginMessage: { type: 'import-tokens', tokens } }, '*')
    })
    document.getElementById('cancel').addEventListener('click', () => {
      parent.postMessage({ pluginMessage: { type: 'cancel' } }, '*')
    })
  </script>
</body>
</html>
